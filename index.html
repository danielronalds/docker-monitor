<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>docker-monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      color: #c9d1d9;
    }

    main {
      text-align: center;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    p {
      margin-bottom: 1.5rem;
      color: #8b949e;
    }

    .code-block {
      position: relative;
      display: inline-block;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 1rem 3.5rem 1rem 1.5rem;
    }

    code {
      font-family: ui-monospace, "SF Mono", "Cascadia Code", monospace;
      font-size: 0.9rem;
      color: #e6edf3;
      white-space: nowrap;
    }

    .copy-btn {
      position: absolute;
      top: 50%;
      right: 0.75rem;
      transform: translateY(-50%);
      background: none;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #8b949e;
      cursor: pointer;
      padding: 0.3rem 0.4rem;
      line-height: 1;
      font-size: 0.85rem;
    }

    .copy-btn:hover {
      color: #c9d1d9;
      border-color: #8b949e;
    }
  </style>
</head>
<body>
  <main>
    <img src="assets/readme_demo.png" alt="Demo screenshot" width="600" style="margin-bottom: 1.5rem;">
    <h1>docker-monitor</h1>
    <p>Live Docker container resource monitoring with matplotlib.</p>
    <div class="code-block">
      <code>uv run https://danielronalds.github.io/docker-monitor/docker-monitor.py &lt;container&gt;</code>
      <button class="copy-btn" onclick="copyCommand()" aria-label="Copy to clipboard" title="Copy to clipboard">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"/>
          <path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/>
        </svg>
      </button>
    </div>
  </main>
  <script>
    function copyCommand() {
      navigator.clipboard.writeText(
        "uv run https://danielronalds.github.io/docker-monitor/docker-monitor.py <container>"
      );
    }
  </script>
</body>
</html>
